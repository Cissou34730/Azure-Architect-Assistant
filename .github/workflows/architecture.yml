name: Architecture

on:
  pull_request:
  push:
    branches:
      - main
      - archchatbot

jobs:
  backend-architecture:
    name: Backend architecture checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies
        run: uv sync

      - name: Backend architecture tests
        run: >
          uv run python -m pytest
          backend/tests/architecture
          backend/tests/features/projects/test_architecture_inputs_decomposition.py
          backend/tests/features/projects/test_project_state_components_decomposition.py
          backend/tests/features/projects/test_workspace_composer_contract.py
          backend/tests/features/projects/test_workspace_router.py
          backend/tests/features/projects/test_state_router_projection.py
          backend/tests/test_analyze_docs_smoke.py
          backend/tests/test_merge_updates_conflicts.py
          -q

      - name: Import-linter
        run: PYTHONPATH=backend uv run lint-imports --config .importlinter

  horizontal-module-freeze:
    name: Horizontal module freeze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies
        run: uv sync

      - name: Enforce horizontal module freeze
        run: uv run python scripts/check_horizontal_module_freeze.py --fail-on-violation

  frontend-architecture:
    name: Frontend architecture checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Focused frontend architecture lint
        run: >
          npx eslint
          "frontend/src/app/**/*.{ts,tsx}"
          "frontend/src/architecture/**/*.{ts,tsx}"
          "frontend/src/features/**/*.{ts,tsx}"
          "frontend/src/shared/**/*.{ts,tsx}"

      - name: Frontend architecture unit tests
        run: npx vitest run --pool=forks frontend/src/architecture/import-boundaries.test.ts