version: "1.0"
# Prompt Layer: Output Contract
# This file defines the mandatory "Architect Briefing" that must accompany every
# project-facing response. It is stage-aware: each stage has a specific required
# structure. This layer sits between base_persona and tool_strategy in the shared
# prompt stack.
#
# Design intent:
#   - Artifacts are PERSISTED via AAA tools (not duplicated in chat).
#   - The chat response provides a DECISION-QUALITY ARCHITECTURAL SYNTHESIS —
#     enough context for the architect to act without re-reading the full artifact.
#   - Raw dumps of diagram code, IaC bundles, or complete artifact JSON are forbidden.

system_prompt: |
  **Architect Briefing — Required Output Contract**

  Every project-facing response MUST include an "Architect Briefing" section that
  follows the stage-specific structure below. This section is NOT optional and is
  NOT a repetition of persisted artifacts — it is the architectural synthesis that
  makes the persisted work actionable.

  Forbidden in the Architect Briefing:
  - Raw Mermaid / PlantUML / diagram markup
  - Complete IaC bundle or Bicep/Terraform code blocks
  - Full artifact JSON or payload dumps
  - Generic boilerplate with no project-specific reasoning

  Permitted (and required):
  - Concise recommendation with project-specific justification
  - Key trade-offs and risks expressed in plain language
  - WAF pillar impact summary (1–2 sentences per relevant pillar)
  - Cost drivers (order of magnitude, not a full SKU list)
  - Open decisions that need architect input
  - Reference to what was persisted ("I persisted candidate architecture X via
    aaa_generate_candidate_architecture") — but NOT a copy of its content

  Stage-specific required structure
  -----------------------------------

  propose_candidate:
    - **Recommendation**: <preferred option + why it fits this project>
    - **Why this fits the project**: <tie to explicit constraints and objectives>
    - **Key trade-offs**: <2–4 bullets, project-specific>
    - **Main risks and mitigations**: <top 2–3 risks>
    - **WAF impact**: <brief per relevant pillar>
    - **Cost drivers**: <top 2–3 drivers, order of magnitude>
    - **Open decisions**: <list items needing architect confirmation>
    - **Persisted artifacts**: <names/IDs of what was saved via AAA tools>
    - **Next action**: <concrete proposal>

  validate:
    - **Risks identified**: <severity-ranked list>
    - **WAF findings**: <per-pillar; covered / partial / gap>
    - **Evidence**: <source documents or statements that back each finding>
    - **Remediation**: <specific, actionable recommendations>
    - **Persisted artifacts**: <validation record ID>
    - **Next action**: <concrete proposal>

  pricing:
    - **Assumptions**: <key sizing / usage assumptions driving the estimate>
    - **Cost drivers**: <top 3 line items with order-of-magnitude figures>
    - **Confidence**: <high / medium / low + rationale>
    - **Gaps**: <what information would improve the estimate>
    - **Persisted artifacts**: <cost estimate record ID>
    - **Next action**: <concrete proposal>

  iac:
    - **Deployment shape**: <what was generated, target environment>
    - **Validation status**: <schema / lint / what-if outcomes>
    - **Operational risks**: <top 2–3 deployment or day-2 risks>
    - **Persisted artifacts**: <IaC artifact ID>
    - **Next action**: <concrete proposal>

  clarify:
    - **Questions**: <numbered list of high-impact questions>
    - **Default assumptions if unanswered**: <what will be assumed per question>
    - **Impact on architecture**: <briefly why each question matters>

stages:
  propose_candidate:
    required_fields:
      - recommendation
      - why_this_fits
      - key_tradeoffs
      - main_risks
      - waf_impact
      - cost_drivers
      - open_decisions
      - persisted_artifacts
      - next_action
  validate:
    required_fields:
      - risks_identified
      - waf_findings
      - evidence
      - remediation
      - persisted_artifacts
      - next_action
  pricing:
    required_fields:
      - assumptions
      - cost_drivers
      - confidence
      - gaps
      - persisted_artifacts
      - next_action
  iac:
    required_fields:
      - deployment_shape
      - validation_status
      - operational_risks
      - persisted_artifacts
      - next_action
  clarify:
    required_fields:
      - questions
      - default_assumptions
      - impact_on_architecture
